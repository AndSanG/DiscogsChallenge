name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Domain & Infrastructure Tests
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run domain tests (macOS, no simulator)
        run: |
          xcodebuild test \
            -scheme DiscogsSearchTests \
            -destination "platform=macOS" \
            -enableThreadSanitizer YES \
            | xcpretty || exit 1

      - name: Run end-to-end API tests (macOS, token required)
        if: env.DISCOGS_API_TOKEN != ''
        env:
          DISCOGS_API_TOKEN: ${{ secrets.DISCOGS_API_TOKEN }}
        run: |
          xcodebuild test \
            -scheme DiscogsSearchAPIEndToEndTests \
            -destination "platform=macOS" \
            | xcpretty || exit 1
